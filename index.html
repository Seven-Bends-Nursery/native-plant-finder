// 2. A robust CSV parser to handle commas inside your descriptions
function parseCSV(str) {
    const arr = [];
    let quote = false;
    let row = 0, col = 0;
    for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c+1];
        arr[row] = arr[row] || [];
        arr[row][col] = arr[row][col] || '';
        
        if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
        if (cc === '"') { quote = !quote; continue; }
        if (cc === ',' && !quote) { ++col; continue; }
        if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
        if (cc === '\r' && !quote) { ++row; col = 0; continue; }
        
        arr[row][col] += cc;
    }
    return arr;
}

// 3. Convert the CSV into our app's format
function processCSV(csvText) {
    const data = parseCSV(csvText);
    const headers = data[0].map(h => h.trim());
    const nonPlantCategories = ['Books', 'Services', 'Gift Card', 'Stickers', 'Supplies', 'Blank'];
    
    plantData = [];
    
    for (let i = 1; i < data.length; i++) {
        if (data[i].length < 5) continue; 
        
        let obj = {};
        headers.forEach((h, index) => {
            obj[h] = data[i][index] ? data[i][index].trim() : '';
        });

        // Skip non-plants
        if (!obj['Category'] || nonPlantCategories.includes(obj['Category'])) continue;

        plantData.push({
            cat: obj['Category'].replace('_MF', ''),
            s: obj['Scientific Name'],
            c: obj['Common Name'],
            l: obj['Light'] || '',
            m: obj['Moisture'] || '',
            h: obj['Size_Concat'] ? obj['Size_Concat'].split(';')[0].replace('Height:', '').trim() : '',
            d: obj['DescriptionBase'] || '',
            // If you add an "Inventory" column to your CSV later, you can map it here!
            inv: obj['Inventory'] ? parseInt(obj['Inventory'], 10) : 1 
        });
    }
    
    init(); // Setup the dropdowns now that data is loaded
}

function update() {
    const s = document.getElementById('search').value.toLowerCase();
    const c = document.getElementById('fCat').value;
    const l = document.getElementById('fLight').value;
    const m = document.getElementById('fMoist').value;
    const inStock = document.getElementById('fStock').checked;

    // Map inventory data to the main plant list dynamically
    const enrichedData = plantData.map(p => {
        const sciNameLower = p.s.toLowerCase().trim();
        p.inv = inventoryData[sciNameLower] || 0;
        return p;
    });

    const filtered = enrichedData.filter(p => {
        const sMatch = p.c.toLowerCase().includes(s) || p.s.toLowerCase().includes(s) || p.d.toLowerCase().includes(s);
        const cMatch = c === 'all' || p.cat === c;
        const lMatch = l === 'all' || p.l.includes(l);
        const mMatch = m === 'all' || p.m.includes(m);
        const stockMatch = !inStock || p.inv > 0;
        return sMatch && cMatch && lMatch && mMatch && stockMatch;
    });

    // Sort by inventory count (highest first)
    filtered.sort((a, b) => b.inv - a.inv);

    document.getElementById('count').innerText = filtered.length;
    const grid = document.getElementById('grid');
    grid.innerHTML = filtered.map(p => {
        const isEligible = p.d.includes('Throwing Shade');
        const cleanDesc = p.d.replace('Throwing Shade', '').trim();
        const invTagHtml = p.inv > 0 
            ? `<span class="tag inv-tag">✅ ${p.inv} in stock</span>` 
            : `<span class="tag inv-out">❌ Out of stock</span>`;

        return `
        <div class="card">
            <div class="card-inner">
                <p class="common-name">${p.c}</p>
                <span class="sci-name">${p.s}</span>
                <div class="tags">
                    ${invTagHtml}
                    <span class="tag">${p.cat}</span>
                    <span class="tag">${p.l}</span>
                    <span class="tag">${p.m}</span>
                    <span class="tag">Height: ${p.h}</span>
                </div>
                <p class="desc">${cleanDesc}</p>
            </div>
            ${isEligible ? `<div class="promo">Eligible for $25 Throwing Shade VA Discount</div>` : ''}
        </div>`
    }).join('');
}

    // 4. Setup dropdown filters dynamically based on the dataset
    function init() {
        const cats = new Set(), lights = new Set(), moists = new Set();
        
        plantData.forEach(p => {
            cats.add(p.cat);
            // Split complex ranges (e.g. "Wet to Medium-Wet") so users can filter by base words
            p.l.split(/,|to/).forEach(v => lights.add(v.trim()));
            p.m.split(/,|to|-/).forEach(v => moists.add(v.trim()));
        });

        const populate = (id, set) => {
            const el = document.getElementById(id);
            Array.from(set).filter(Boolean).sort().forEach(val => {
                el.innerHTML += `<option value="${val}">${val}</option>`;
            });
        };

        populate('fCat', cats);
        populate('fLight', lights);
        populate('fMoist', moists);

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', update));
        update();
    }

    init();
