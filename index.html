<script>
    // 1. Read the embedded database
    const rawText = document.getElementById('database').textContent.trim();
    
    // 2. Parse the pipe-delimited data
    const plantData = rawText.split('\n').filter(line => line.trim().length > 0).map(line => {
        const p = line.split('|');
        return { cat: p[0], s: p[1], c: p[2], l: p[3], m: p[4], h: p[5], d: p[6] };
    });

    // 3. Update the UI based on filters
    function update() {
        const search = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        const light = document.getElementById('fLight').value;
        const moist = document.getElementById('fMoist').value;

        const filtered = plantData.filter(p => {
            const matchesSearch = p.c.toLowerCase().includes(search) || p.s.toLowerCase().includes(search) || p.d.toLowerCase().includes(search);
            const matchesCat = cat === 'all' || p.cat === cat;
            const matchesLight = light === 'all' || p.l.includes(light);
            const matchesMoist = moist === 'all' || p.m.includes(moist);
            return matchesSearch && matchesCat && matchesLight && matchesMoist;
        });

        document.getElementById('count').innerText = filtered.length;
        const grid = document.getElementById('grid');
        
        grid.innerHTML = filtered.map(p => {
            // Check if the description includes the discount trigger
            const isEligible = p.d.includes('Throwing Shade');
            // Clean the description to remove the raw "Throwing Shade" text if present
            const cleanDesc = p.d.replace('Throwing Shade', '').trim();

            return `
            <div class="card">
                <div class="card-inner">
                    <p class="common-name">${p.c}</p>
                    <span class="sci-name">${p.s}</span>
                    <div class="tags">
                        <span class="tag">${p.cat}</span>
                        <span class="tag">${p.l}</span>
                        <span class="tag">${p.m}</span>
                        <span class="tag">Height: ${p.h}</span>
                    </div>
                    <p class="desc">${cleanDesc}</p>
                </div>
                ${isEligible ? `<div class="promo">Eligible for $25 Throwing Shade VA Discount</div>` : ''}
            </div>`
        }).join('');
    }

    // 4. Setup dropdown filters dynamically based on the dataset
    function init() {
        const cats = new Set(), lights = new Set(), moists = new Set();
        
        plantData.forEach(p => {
            cats.add(p.cat);
            // Split complex ranges (e.g. "Wet to Medium-Wet") so users can filter by base words
            p.l.split(/,|to/).forEach(v => lights.add(v.trim()));
            p.m.split(/,|to|-/).forEach(v => moists.add(v.trim()));
        });

        const populate = (id, set) => {
            const el = document.getElementById(id);
            Array.from(set).filter(Boolean).sort().forEach(val => {
                el.innerHTML += `<option value="${val}">${val}</option>`;
            });
        };

        populate('fCat', cats);
        populate('fLight', lights);
        populate('fMoist', moists);

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', update));
        update();
    }

    init();
</script>
</body>
</html>
